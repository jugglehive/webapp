events {
    worker_connections 1024;
}

http {
    server_tokens off;

    server {
        listen 80;
        server_name jugglegames.com;

        location / {
            proxy_pass http://jh-server:8080;
        }

        location ~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name jugglegames.com;

        # use the certbot certificates
        ssl_certificate /etc/letsencrypt/live/jugglegames.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jugglegames.com/privkey.pem;

        location / {
            proxy_pass http://jh-server:8080;
        }

        location ~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    server {
        listen 80;
        server_name cloud.jugglegames.com;

        location / {
            proxy_pass http://nextcloud:80;
        }

        location ~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name cloud.jugglegames.com;

        # use the certbot certificates
        ssl_certificate /etc/letsencrypt/live/cloud.jugglegames.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cloud.jugglegames.com/privkey.pem;

        location / {
            proxy_pass http://nextcloud:80;
        }

        location ~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}