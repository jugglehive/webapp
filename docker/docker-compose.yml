services:

  #Web services
  nginx:
    container_name: nginx
    restart: always
    image: nginx:1.24.0
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web:/etc/nginx/
      - ../data/certbot/conf:/etc/letsencrypt
      - ../data/certbot/www:/var/www/certbot
  certbot:
    container_name: certbot
    image: certbot/certbot:v2.8.0
    volumes:
      - ../data/certbot/conf:/etc/letsencrypt
      - ../data/certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --email "$CERTBOT_EMAIL" -d jugglegames.com -d cloud.jugglegames.com --rsa-key-size 4096 --agree-tos --no-eff-email --force-renewal
    depends_on:
      - nginx

  #Database service
  postgres:
    container_name: postgres
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  #Webapp service
  jh-server:
    container_name: jh-server
    image: ghcr.io/jugglehive/webapp:latest
    restart: always
    depends_on:
      - postgres

  #Cloud services
  nextcloud:
    container_name: nextcloud
    image: nextcloud:28.0.3
    restart: always
    volumes:
      - ../data/nextcloud:/var/www/html
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    depends_on:
      - postgres