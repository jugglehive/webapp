services:

  #Web services
  nginx:
    container_name: nginx
    restart: always
    image: nginx:1.24.0
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web:/etc/nginx/
      - ../data/certbot/conf:/etc/letsencrypt
      - ../data/certbot/www:/var/www/certbot
  certbot:
    container_name: certbot
    image: certbot/certbot:v2.8.0
    volumes:
      - ../data/certbot/conf:/etc/letsencrypt
      - ../data/certbot/www:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --email "$CERTBOT_EMAIL" -d "$DOMAIN" -d "cloud.$DOMAIN" --rsa-key-size 4096 --agree-tos --no-eff-email --force-renewal
    depends_on:
      - nginx

  #Database service
  postgres:
    container_name: postgres
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_HOST_AUTH_METHOD=md5
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
    volumes:
      - ../data/postgres:/var/lib/postgresql/data

  #Webapp service
  app:
    container_name: app
    image: ghcr.io/jugglehive/webapp:latest
    restart: always
    environment:
      - DOMAIN=$DOMAIN
    depends_on:
      - postgres

  #Cloud services
  nextcloud:
    container_name: nextcloud
    image: nextcloud:28.0.3
    restart: always
    volumes:
      - ../data/nextcloud:/var/www/html
      - ../data/certbot/conf:/etc/letsencrypt
      - ../data/certbot/www:/var/www/certbot
    environment:
      - OVERWRITEHOST=cloud.$DOMAIN
      - OVERWRITECLIURL=http://cloud.$DOMAIN
      - OVERWRITEPROTOCOL=https
      - VIRTUAL_HOST=cloud.$DOMAIN
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
    depends_on:
      - postgres